<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mehlbestand">
<title>Mehlbestand</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface2: #f2f0ec;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09e9a;
    --radius: 14px;
    --radius-sm: 8px;
    --green-bg: #eaf3de;
    --green-text: #27500a;
    --green-dot: #3b6d11;
    --green-ring: #c0dd97;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --amber-dot: #854f0b;
    --amber-ring: #fac775;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --red-dot: #a32d2d;
    --red-ring: #f7c1c1;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181715;
      --surface: #232220;
      --surface2: #2c2b28;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text2: #9e9b95;
      --text3: #6a6762;
      --green-bg: #173404;
      --green-text: #c0dd97;
      --green-dot: #639922;
      --green-ring: #3b6d11;
      --amber-bg: #412402;
      --amber-text: #fac775;
      --amber-dot: #ba7517;
      --amber-ring: #854f0b;
      --red-bg: #501313;
      --red-text: #f7c1c1;
      --red-dot: #e24b4a;
      --red-ring: #a32d2d;
    }
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .topbar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .topbar p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .summary-strip {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .summary-strip::-webkit-scrollbar { display: none; }

  .sum-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 14px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sum-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sum-dot.green { background: var(--green-dot); }
  .sum-dot.amber { background: var(--amber-dot); }
  .sum-dot.red { background: var(--red-dot); }
  .sum-dot.gray { background: var(--text3); }
  .sum-label { font-size: 13px; color: var(--text2); }
  .sum-val { font-size: 14px; font-weight: 600; }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 16px 8px;
  }

  .cards {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.985); }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .card-info {}
  .card-name { font-size: 15px; font-weight: 600; }
  .card-type { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .traffic-light {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    padding-top: 2px;
  }
  .tl-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .tl-dot.on-green { background: var(--green-dot); border-color: var(--green-dot); box-shadow: 0 0 0 3px var(--green-ring); }
  .tl-dot.on-amber { background: var(--amber-dot); border-color: var(--amber-dot); box-shadow: 0 0 0 3px var(--amber-ring); }
  .tl-dot.on-red   { background: var(--red-dot);   border-color: var(--red-dot);   box-shadow: 0 0 0 3px var(--red-ring); }

  .card-amount-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 8px;
  }
  .card-amount { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
  .card-unit   { font-size: 13px; color: var(--text2); }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 50px;
    margin-bottom: 10px;
  }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-red   { background: var(--red-bg);   color: var(--red-text); }

  .card-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: var(--border); }
  .btn.minus { color: var(--red-text); border-color: var(--red-ring); background: var(--red-bg); }
  .btn.minus:active { opacity: 0.7; }

  .del-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .del-btn:active { color: var(--red-dot); }

  /* Add form */
  .add-section {
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 16px;
    margin-top: 8px;
  }
  .add-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .form-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-row {
    display: flex;
    gap: 10px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }
  .form-group label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
  }
  input[type=text], input[type=number], select {
    font-size: 15px;
    padding: 10px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--green-dot);
  }

  .add-btn {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    margin-top: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .add-btn:active { opacity: 0.75; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  /* custom quantity input overlay */
  .qty-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-end;
  }
  .qty-overlay.open { display: flex; }
  .qty-sheet {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    width: 100%;
  }
  .qty-sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .qty-sheet p  { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
  .qty-row { display: flex; gap: 10px; }
  .qty-row input { flex: 1; }
  .qty-confirm {
    padding: 11px 20px;
    font-size: 15px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    white-space: nowrap;
  }
  .qty-cancel {
    width: 100%;
    margin-top: 10px;
    padding: 11px;
    font-size: 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: none;
    color: var(--text2);
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🌾 Mehlbestand</h1>
  <p>Bestandsüberwachung für Hobbybäcker</p>
</div>

<div class="summary-strip" id="summary"></div>

<div style="padding: 4px 0 2px;">
  <div class="section-title">Meine Mehlsorten</div>
</div>
<div class="cards" id="cards"></div>

<div class="add-section">
  <div class="add-title">+ Mehlsorte hinzufügen</div>
  <div class="form-fields">
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="inp-name" placeholder="z.B. Dinkelmehl" />
      </div>
      <div class="form-group">
        <label>Typ / Nr.</label>
        <input type="text" id="inp-type" placeholder="Type 630" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Menge (g)</label>
        <input type="number" id="inp-amount" placeholder="500" min="0" step="100" />
      </div>
      <div class="form-group">
        <label>Warnstufen</label>
        <select id="inp-threshold">
          <option value="500,200">500 / 200 g</option>
          <option value="1000,400" selected>1000 / 400 g</option>
          <option value="250,100">250 / 100 g</option>
          <option value="2000,800">2000 / 800 g</option>
        </select>
      </div>
    </div>
    <button class="add-btn" onclick="addMehl()">Hinzufügen</button>
  </div>
</div>

<!-- Custom quantity sheet -->
<div class="qty-overlay" id="qty-overlay" onclick="closeQty(event)">
  <div class="qty-sheet">
    <h3 id="qty-title">Menge anpassen</h3>
    <p id="qty-sub">Aktuelle Menge: 0 g</p>
    <div class="qty-row">
      <input type="number" id="qty-inp" placeholder="Menge in g" min="0" step="50" />
      <button class="qty-confirm" onclick="confirmQty()">Setzen</button>
    </div>
    <button class="qty-cancel" onclick="closeQtySheet()">Abbrechen</button>
  </div>
</div>

<script>
const DEFAULT = [
  { id:1, name:'Weizenmehl', type:'Type 405', amount:1800, warnHigh:1000, warnLow:400 },
  { id:2, name:'Weizenmehl', type:'Type 550', amount:350,  warnHigh:1000, warnLow:400 },
  { id:3, name:'Roggenmehl', type:'Type 1150',amount:100,  warnHigh:500,  warnLow:200 },
  { id:4, name:'Dinkelmehl', type:'Type 630', amount:650,  warnHigh:500,  warnLow:200 },
  { id:5, name:'Vollkornmehl',type:'Weizen',  amount:0,    warnHigh:500,  warnLow:200 },
];

let data = [];
let nextId = 10;
let qtyTarget = null;

function load() {
  try {
    const raw = localStorage.getItem('mehlbestand-v1');
    data = raw ? JSON.parse(raw) : DEFAULT;
  } catch { data = DEFAULT; }
  nextId = Math.max(...data.map(m => m.id), 9) + 1;
}

function save() {
  localStorage.setItem('mehlbestand-v1', JSON.stringify(data));
}

function status(m) {
  if (m.amount >= m.warnHigh) return 'green';
  if (m.amount >= m.warnLow)  return 'amber';
  return 'red';
}

function label(s) {
  return s === 'green' ? 'Viel vorhanden' : s === 'amber' ? 'Mittel – nachkaufen' : 'Wenig – dringend!';
}

function fmt(g) {
  if (g >= 1000) return (g / 1000).toFixed(g % 1000 === 0 ? 0 : 1) + ' kg';
  return g + ' g';
}

function renderSummary() {
  const c = { green:0, amber:0, red:0 };
  data.forEach(m => c[status(m)]++);
  document.getElementById('summary').innerHTML = `
    <div class="sum-pill"><div class="sum-dot green"></div><span class="sum-label">Gut vorrätig</span><span class="sum-val">${c.green}</span></div>
    <div class="sum-pill"><div class="sum-dot amber"></div><span class="sum-label">Mittelknapp</span><span class="sum-val">${c.amber}</span></div>
    <div class="sum-pill"><div class="sum-dot red"></div><span class="sum-label">Fast leer</span><span class="sum-val">${c.red}</span></div>
    <div class="sum-pill"><div class="sum-dot gray"></div><span class="sum-label">Total</span><span class="sum-val">${data.length}</span></div>
  `;
}

function renderCards() {
  const el = document.getElementById('cards');
  if (!data.length) { el.innerHTML = '<div class="empty">Noch keine Mehlsorten erfasst.</div>'; return; }
  // Sort: red first, then amber, then green
  const order = { red:0, amber:1, green:2 };
  const sorted = [...data].sort((a,b) => order[status(a)] - order[status(b)]);
  el.innerHTML = sorted.map(m => {
    const s = status(m);
    const [fmtVal, fmtUnit] = m.amount >= 1000
      ? [(m.amount/1000).toFixed(m.amount%1000===0?0:1), 'kg']
      : [m.amount, 'g'];
    return `
      <div class="card" id="card-${m.id}">
        <button class="del-btn" onclick="deleteMehl(${m.id})" title="Löschen">×</button>
        <div class="card-head">
          <div class="card-info">
            <div class="card-name">${m.name}</div>
            <div class="card-type">${m.type}</div>
          </div>
          <div class="traffic-light">
            <div class="tl-dot ${s==='green'?'on-green':''}"></div>
            <div class="tl-dot ${s==='amber'?'on-amber':''}"></div>
            <div class="tl-dot ${s==='red'?'on-red':''}"></div>
          </div>
        </div>
        <div class="card-amount-row">
          <span class="card-amount">${fmtVal}</span>
          <span class="card-unit">${fmtUnit}</span>
        </div>
        <div><span class="badge badge-${s}">${label(s)}</span></div>
        <div class="card-btns">
          <button class="btn" onclick="adjust(${m.id}, 100)">+100g</button>
          <button class="btn" onclick="adjust(${m.id}, 500)">+500g</button>
          <button class="btn minus" onclick="adjust(${m.id}, -100)">−100g</button>
          <button class="btn" onclick="openQty(${m.id})" style="color:var(--text2)">✎ Eingeben</button>
        </div>
      </div>
    `;
  }).join('');
}

function render() { renderSummary(); renderCards(); }

function adjust(id, delta) {
  const m = data.find(x => x.id === id);
  if (m) { m.amount = Math.max(0, m.amount + delta); save(); render(); }
}

function deleteMehl(id) {
  if (confirm('Mehlsorte wirklich löschen?')) {
    data = data.filter(x => x.id !== id);
    save(); render();
  }
}

function addMehl() {
  const name = document.getElementById('inp-name').value.trim();
  const type = document.getElementById('inp-type').value.trim();
  const amount = parseInt(document.getElementById('inp-amount').value) || 0;
  const [warnHigh, warnLow] = document.getElementById('inp-threshold').value.split(',').map(Number);
  if (!name) { document.getElementById('inp-name').focus(); return; }
  data.push({ id: nextId++, name, type: type || '—', amount, warnHigh, warnLow });
  save(); render();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-type').value = '';
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-name').focus();
}

function openQty(id) {
  qtyTarget = id;
  const m = data.find(x => x.id === id);
  document.getElementById('qty-title').textContent = m.name + ' – Menge setzen';
  document.getElementById('qty-sub').textContent = 'Aktuell: ' + fmt(m.amount);
  document.getElementById('qty-inp').value = m.amount;
  document.getElementById('qty-overlay').classList.add('open');
  setTimeout(() => document.getElementById('qty-inp').focus(), 100);
}

function confirmQty() {
  const val = parseInt(document.getElementById('qty-inp').value);
  if (isNaN(val) || val < 0) return;
  const m = data.find(x => x.id === qtyTarget);
  if (m) { m.amount = val; save(); render(); }
  closeQtySheet();
}

function closeQtySheet() {
  document.getElementById('qty-overlay').classList.remove('open');
  qtyTarget = null;
}

function closeQty(e) {
  if (e.target === document.getElementById('qty-overlay')) closeQtySheet();
}

document.getElementById('qty-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmQty();
});

load();
render();
</script>
</body>
</html>
